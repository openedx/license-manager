name: Migration check on MySql8

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

jobs:
  check_migrations:
    name: check migration for MySql8
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ 3.12 ]

    steps:
    - name: Checkout repo
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y libxmlsec1-dev
    - name: Get pip cache dir
      id: pip-cache-dir
      run: |
        echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT
    - name: Cache pip dependencies
      id: cache-dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.pip-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements/pip_tools.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Ubuntu and sql versions
      run: |
        lsb_release -a
        mysql -V
    - name: Install Python Dependencies
      run: |
        pip install -r requirements/pip-tools.txt
        pip install -r requirements/production.txt
        pip uninstall -y mysqlclient
        pip install --no-binary mysqlclient mysqlclient
        pip uninstall -y xmlsec
        pip install --no-binary xmlsec xmlsec==1.3.13
    - name: Initiate services
      run: |
        sudo /etc/init.d/mysql start
    - name: Reset mysql password
      run: |
        cat <<EOF | mysql -h 127.0.0.1 -u root --password=root
          UPDATE mysql.user SET authentication_string = null WHERE user = 'root';
          FLUSH PRIVILEGES;
        EOF
    - name: Run migrations
      env:
        DB_ENGINE: "django.db.backends.mysql"
        DB_NAME: "license_manager"
        DB_USER: root
        DB_PASSWORD:
        DB_HOST: localhost
        DB_PORT: 3306
      run: |
        echo "CREATE DATABASE IF NOT EXISTS license_manager;" | sudo mysql -u root
        echo "Running the migrations"
        python manage.py migrate --settings=license_manager.settings.test
