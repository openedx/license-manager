name: Django CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        django-version: ["pinned", "5.2"]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install requirements
      run: make requirements
    - name: Upgrade packages
      run: |
        pip install -U pip wheel codecov -c requirements/constraints.txt
        if [[ "${{ matrix.django-version }}" != "pinned" ]]; then
          pip install "django~=${{ matrix.django-version }}.0"
          pip check # fail if this test-reqs/Django combination is broken
        fi
    - name: Validate translations
      run: make validate_translations
    - name: Run tests
      run: make test
    - name: Codecov
      run: codecov
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install requirements
      run: make requirements
    - name: Upgrade packages
      run: pip install -U pip wheel codecov
    - name: Run pylint
      run: make lint
    - name: Run pycodestyle
      run: make style
    - name: Run isort
      run: make isort_check
    - name: Run pii check
      run: make pii_check
